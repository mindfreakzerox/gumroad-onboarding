<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Automation Playbook Catalog | Gumroad Ideas</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --text: #112033;
      --muted: #5d6f86;
      --border: #dbe5f0;
      --brand: #2b7de9;
      --brand-soft: #e8f2ff;
      --teal: #10b7a6;
      --shadow: 0 8px 28px rgba(19, 44, 77, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.55;
    }

    .container {
      max-width: 100%;
      margin: 0;
      padding: 22px 32px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .logout-link {
      color: #5d6f86;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px 10px;
      border-radius: 10px;
    }

    .logout-link:hover {
      color: #17395f;
      border-color: #b8cde3;
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.6vw, 2.4rem);
      color: #0f2440;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 900px;
    }

    .chips {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: #274665;
      font-size: .86rem;
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 16px;
      min-height: 68vh;
    }

    .sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-head {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      color: #19314e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .menu-toggle {
      display: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-soft);
      color: #173352;
      font-size: 1rem;
      padding: 6px 10px;
      cursor: pointer;
    }

    .product-list {
      overflow-y: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .product-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 11px;
      cursor: pointer;
      transition: all .18s ease;
    }

    .product-btn:hover {
      border-color: #b8cde3;
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(30, 77, 128, 0.08);
    }

    .product-btn.active {
      border-color: var(--brand);
      background: var(--brand-soft);
      box-shadow: inset 0 0 0 1px rgba(43,125,233,.08);
    }

    .product-title {
      margin: 0;
      font-weight: 700;
      font-size: .95rem;
      color: #102c4a;
    }

    .product-desc {
      margin: 4px 0 0;
      font-size: .82rem;
      color: var(--muted);
    }

    .featured-badge {
      display: inline-flex;
      margin-top: 7px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #90e3d8;
      background: #eafffb;
      color: #0b7f72;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    .meta {
      color: var(--muted);
      margin-top: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin: 12px 0;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 12px;
    }

    h2 { margin: 0 0 8px; }
    h3 { margin: 16px 0 8px; color: #17406c; }

    ul { margin: 8px 0 0 20px; padding: 0; }
    li { margin-bottom: 6px; }

    details {
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 10px 0;
      background: #fff;
      overflow: hidden;
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 700;
      color: #16395d;
      background: #f7fbff;
      border-bottom: 1px solid transparent;
    }

    details[open] summary {
      border-bottom-color: var(--border);
    }

    .diagram-wrap { padding: 10px 0 14px; width: 100%; }

    .mermaid {
      background: #fff;
      border-radius: 10px;
      overflow-x: auto;
      padding: 12px;
      width: 100%;
      min-height: 200px;
    }
    .mermaid svg {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
    }

    

    .action-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .playbook-btn {
      border: 1px solid var(--brand);
      background: var(--brand-soft);
      color: #0f3f75;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .playbook-reader {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      max-height: 58vh;
      overflow: auto;
    }

    .playbook-reader h1, .playbook-reader h2, .playbook-reader h3 {
      color: #17395f;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .menu-toggle { display: inline-flex; }
      .sidebar .product-list { display: none; max-height: 44vh; }
      .sidebar.open .product-list { display: grid; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="logout-link" href="/logout">🔒 Logout</a>
    </div>
    <section class="hero">
      <h1>AI Automation Playbook Catalog</h1>
      <p class="subtitle">Explore 10 high-demand productized automation playbooks. Pick any idea from the left to view complete details and workflow diagrams on the right.</p>
      <div class="chips">
        <span class="chip">10 Product Ideas</span>
        <span class="chip">Sidebar Navigation</span>
        <span class="chip">Per-product Mermaid Diagrams</span>
      </div>
    </section>

    <section class="layout" aria-label="Catalog with sidebar and detail panel">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          Product Ideas
          <button id="menuToggle" class="menu-toggle" aria-label="Toggle product list">☰</button>
        </div>
        <div id="productList" class="product-list"></div>
      </aside>
      <article id="detail" class="main"></article>
    </section>
  </div>

        sequence: `sequenceDiagram

participant Owner
Diner->>System: QR scan
System->>Diner: Review prompt
Diner->>System: Submit review
AI->>System: Sentiment analysis

        useCase: `flowchart TB
OW[Owner] --> O1((Monitor reviews))
OW --> O2((Respond to feedback))
OW --> O3((Generate reports))
DI[Diner] --> D1((Leave review))
DI --> D2((Receive thank you))`

      {
        title: "E-commerce Returns",
        short: "Streamlined returns with auto-classification, labels, refunds, and surveys.",

        covers: ["Process returns", "Track inventory impact", "Analyze return patterns"],
        flow: `flowchart TD
A[Customer requests return] --> B[Auto-classify reason]

D --> E[Process refund]
E --> F[Feedback survey]`,
        sequence: `sequenceDiagram
participant Customer
participant System

Customer->>System: Return form
System->>System: Classification
System->>Customer: Shipping label
Warehouse->>System: Item received

        useCase: `flowchart TB

CU[Customer] --> C1((Request return))

      {

        short: "Vendor matching, timeline generation, and event coordination automation.",
        playbook: "07-wedding-event-planner.md",
        manual: "07-wedding-event-planner-manual.md",
        description: "Automate planning workflows from inquiry to day-of checklist so planners can deliver consistently under tight deadlines.",
        price: "$37",
        tools: "Budget forms, AI vendor matching, timeline/task system",
        covers: ["Match vendors", "Build timelines", "Coordinate tasks"],
        flow: `flowchart TD
A[Inquiry] --> B[Budget questionnaire]
B --> C[AI vendor matching]
C --> D[Timeline generation]
D --> E[Task assignments]
E --> F[Day-of checklist]`,
        sequence: `sequenceDiagram
participant Couple
participant System
participant AI
participant Planner
Couple->>System: Inquiry form
System->>System: Budget analysis
AI->>Planner: Vendor matches
Planner->>Couple: Proposal
System->>Couple: Timeline
System->>Planner: Vendor coordination`,
        useCase: `flowchart TB
PL[Planner] --> P1((Match vendors))
PL --> P2((Generate timelines))

CP[Couple] --> C1((Submit preferences))
CP --> C2((Approve vendors))

      {

        short: "Maintenance request triage, contractor assignment, and tenant updates.",
        playbook: "08-property-management.md",
        manual: "08-property-management-manual.md",
        description: "Automate property maintenance operations for faster issue resolution and better tenant communication.",
        price: "$36",
        tools: "Maintenance forms, AI categorization, contractor dispatch",
        covers: ["Triage requests", "Assign contractors", "Track completion"],
        flow: `flowchart TD
A[Tenant reports issue] --> B[Auto-categorize issue]
B --> C[Assign contractor]
C --> D[Schedule repair]
D --> E[Tenant notification]
E --> F[Completion verification]`,
        sequence: `sequenceDiagram
participant Tenant
participant AI
participant System
participant Contractor
Tenant->>System: Maintenance form
AI->>System: Categorize issue

Contractor->>System: Schedule repair

        useCase: `flowchart TB
MG[Manager] --> M1((Triage requests))

      {

        flow: `flowchart TD
A[Parent inquiry] --> B[Student assessment form]

participant Parent
participant System
participant AI

      {

        tools: "Online booking, digital forms, AI post-care content, recall reminders",
        covers: ["Manage appointments", "Send reminders", "Generate instructions"],
        flow: `flowchart TD
A[Patient books online] --> B[Intake forms pre-visit]
B --> C[Appointment reminder]
C --> D[Visit]
D --> E[AI post-care instructions]
E --> F[6-month recall reminder]`,
        sequence: `sequenceDiagram
participant Patient
participant System
participant Dentist
participant AI

System->>Patient: Intake forms
System->>Patient: Reminder
Dentist->>Patient: Treatment

        useCase: `flowchart TB
CL[Clinic] --> C1((Manage appointments))

    ];

    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const productList = document.getElementById('productList');
    const detail = document.getElementById('detail');

    let selectedIndex = 0;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { curve: 'basis', useMaxWidth: true, htmlLabels: true, padding: 20 },
      sequence: { useMaxWidth: true, width: 150, height: 65 },
      themeVariables: { fontSize: '14px' }
    });

    function renderSidebar() {
      productList.innerHTML = products.map((p, i) => `
        <button class="product-btn ${i === selectedIndex ? 'active' : ''}" data-index="${i}" type="button">
          <p class="product-title">${i + 1}. ${p.title}</p>
          <p class="product-desc">${p.short}</p>
          ${p.featured ? '<span class="featured-badge">Featured</span>' : ''}
        </button>
      `).join('');

      [...productList.querySelectorAll('.product-btn')].forEach(btn => {
        btn.addEventListener('click', () => {
          selectedIndex = Number(btn.dataset.index);
          renderSidebar();
          renderDetail();
          if (window.innerWidth <= 900) sidebar.classList.remove('open');
        });
      });
    }

    function renderDetail() {
      const p = products[selectedIndex];
      detail.innerHTML = `
        <h2>${selectedIndex + 1}. ${p.title} ${p.featured ? '⭐' : ''}</h2>
        <p class="meta">${p.description}</p>

        <div class="two-col">
          <div class="panel">
            <strong>Price</strong>
            <p>${p.price}</p>
          </div>
          <div class="panel">
            <strong>Core Stack</strong>
            <p>${p.tools}</p>
          </div>
        </div>

        <h3>What this playbook covers</h3>
        <ul>${p.covers.map(item => `<li>${item}</li>`).join('')}</ul>

        <div class="action-row">
          <button class="playbook-btn" id="readPlaybookBtn" type="button">📖 Read Full Playbook</button>
          <button class="playbook-btn" id="readManualBtn" type="button">📘 Read Full Manual</button>
        </div>
        <div id="playbookReader" class="playbook-reader" hidden></div>

        <h3>Diagrams</h3>
        <details>
          <summary>Flow Diagram</summary>
          <div class="diagram-wrap"><div class="mermaid">${p.flow}</div></div>
        </details>

        <details>
          <summary>Sequence Diagram</summary>
          <div class="diagram-wrap"><div class="mermaid">${p.sequence}</div></div>
        </details>

        <details>
          <summary>Use Case Diagram (Actor-style flowchart)</summary>
          <div class="diagram-wrap"><div class="mermaid">${p.useCase}</div></div>
        </details>
      `;

      mermaid.run({ nodes: detail.querySelectorAll('.mermaid') });

      const btn = document.getElementById('readPlaybookBtn');
      const manualBtn = document.getElementById('readManualBtn');
      const reader = document.getElementById('playbookReader');

      btn.addEventListener('click', async () => {
        const p = products[selectedIndex];
        try {
          btn.disabled = true;
          btn.textContent = 'Loading playbook...';
          const res = await fetch(`/playbooks/${p.playbook}`);
          const md = await res.text();
          reader.innerHTML = marked.parse(md);
          reader.hidden = false;
          btn.textContent = '📖 Read Full Playbook';
        } catch (e) {
          reader.hidden = false;
          reader.innerHTML = '<p>Could not load playbook. Please try again.</p>';
          btn.textContent = '📖 Read Full Playbook';
        } finally {
          btn.disabled = false;
        }
      });

      manualBtn.addEventListener('click', async () => {
        const p = products[selectedIndex];
        try {
          manualBtn.disabled = true;
          manualBtn.textContent = 'Loading manual...';
          const res = await fetch(`/manuals/${p.manual}`);
          const md = await res.text();
          reader.innerHTML = marked.parse(md);
          reader.hidden = false;
          manualBtn.textContent = '📘 Read Full Manual';
        } catch (e) {
          reader.hidden = false;
          reader.innerHTML = '<p>Could not load manual. Please try again.</p>';
          manualBtn.textContent = '📘 Read Full Manual';
        } finally {
          manualBtn.disabled = false;
        }
      });
    }

    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

    renderSidebar();
    renderDetail();
  </script>
</body>
</html>
