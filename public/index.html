      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 280px;
      transition: transform .18s ease, border-color .18s ease;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); border-color: #36507d; }
    .thumb {
      height: 120px;
      background: linear-gradient(135deg, rgba(110,168,254,.35), rgba(130,247,211,.25));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .card-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .card h3 { margin: 0; font-size: 1.02rem; }
    .small { margin: 0; color: var(--muted); font-size: .92rem; }
    .price { color: var(--price); font-weight: 700; margin-top: auto; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(3,8,20,.75);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 18px;
      overflow: auto;
      z-index: 30;
    }
    .modal.show { display: flex; }
    .sheet {
      margin-top: 24px;
      width: min(980px, 100%);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px;
      position: relative;
    }
    .close {
      position: absolute; right: 14px; top: 12px;
      border: 1px solid var(--border); background: #172743; color: var(--text);
      border-radius: 10px; padding: 6px 10px; cursor: pointer;
    }
    h2 { margin: 0 0 6px; }
    .meta { color: var(--muted); margin-bottom: 14px; }
    .section { margin-top: 16px; }
    .section h4 {
      margin: 0 0 6px;
      color: var(--brand-2);
      font-size: .98rem;
      letter-spacing: .03em;
      text-transform: uppercase;

    li { margin-bottom: 6px; }
    .two-col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    .panel {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 12px;

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 640px) {
      .container { padding: 14px; }
      .hero { padding: 18px; }

          discord: "🦷 Dental Clinic Intake Automation\nAutomate forms, reminders, and recall campaigns.\nReduce no-shows and boost schedule utilization.\nLighten front-desk workload with smart workflows."
        },
        media: {
          gumroad: "Modern dental clinic dashboard with patient intake forms and appointment reminder timeline.",
          youtube: "Dental office visual with calendar filling up from automated recall campaign.",
          instagram: "Healthcare-themed graphic showing patient intake to appointment confirmation flow.",
          facebook: "Clean clinical operations image with reminders, recalls, and KPI widgets.",
          x: "Minimal medical-style card with headline about automating patient intake and recalls."
        }
      }
    ];

    const catalog = document.getElementById('catalog');
    const modal = document.getElementById('modal');
    const detail = document.getElementById('detail');
    const closeBtn = document.getElementById('closeBtn');

    const sectionList = (title, arr) => `
      <div class="section">
        <h4>${title}</h4>
        <ul>${arr.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    `;

    products.forEach((p, i) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb">Playbook #${i + 1}</div>
        <div class="card-body">
          <h3>${p.title}</h3>
          <p class="small">${p.shortDescription.slice(0, 130)}...</p>
          <p class="price">${p.price}</p>
        </div>
      `;
      card.addEventListener('click', () => openDetail(p, i + 1));
      catalog.appendChild(card);
    });

    function openDetail(p, n) {
      detail.innerHTML = `
        <h2 id="title">#${n} ${p.title}</h2>
        <p class="meta">${p.shortDescription}</p>

        <div class="two-col">
          <div class="panel">
            <div class="section">
              <h4>Product Info</h4>
              <p><strong>Title:</strong> ${p.title}</p>
              <p><strong>Price Suggestion:</strong> <span class="tagline">${p.price}</span></p>
              <p><strong>Tags:</strong> ${p.tags}</p>
            </div>
          </div>
          <div class="panel">
            <div class="section">
              <h4>Tools Used</h4>
              <p>${p.tools}</p>
            </div>
          </div>
        </div>

        ${sectionList('What the Playbook Covers', p.covers)}

        <div class="section">
          <h4>Social Video Prompts</h4>
          <ul>
            <li><strong>Instagram Reel:</strong> ${p.socialPrompts.igReel}</li>
            <li><strong>Instagram Story:</strong> ${p.socialPrompts.igStory}</li>
            <li><strong>Facebook Reel:</strong> ${p.socialPrompts.fbReel}</li>
            <li><strong>Facebook Story:</strong> ${p.socialPrompts.fbStory}</li>
            <li><strong>YouTube Short:</strong> ${p.socialPrompts.ytShort}</li>
          </ul>
        </div>

        <div class="section">
          <h4>Marketing Copy</h4>
          <ul>
            <li><strong>X/Twitter:</strong> ${p.marketing.x}</li>
            <li><strong>Reddit Title:</strong> ${p.marketing.redditTitle}<br><strong>Body:</strong> ${p.marketing.redditBody}</li>
            <li><strong>Discord Announcement:</strong><br><span class="mono">${p.marketing.discord.replace(/\n/g, '<br>')}</span></li>
          </ul>
        </div>

        <div class="section">
          <h4>Media Prompts</h4>
          <ul>
            <li><strong>Gumroad Cover:</strong> ${p.media.gumroad}</li>
            <li><strong>YouTube Thumbnail:</strong> ${p.media.youtube}</li>
            <li><strong>Instagram Post:</strong> ${p.media.instagram}</li>
            <li><strong>Facebook Share Image:</strong> ${p.media.facebook}</li>
            <li><strong>X/Twitter Card:</strong> ${p.media.x}</li>
          </ul>
        </div>
      `;
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
